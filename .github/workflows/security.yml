name: Security

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Audit pinned dependencies
        run: |
          python -m pip install --upgrade pip pip-audit
          pip-audit -r requirements-core.txt
          pip-audit -r requirements-optional.txt
          pip-audit -r requirements-headless.txt

  codeql:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          build-mode: none
      - name: Analyze
        uses: github/codeql-action/analyze@v4
